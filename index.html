<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PoSimon POS Simulator</title>
    <style>
      :root {
        --primary: #2c3e50;
        --accent: #e74c3c;
        --light: #ecf0f1;
        --success: #27ae60;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        display: flex;
        height: 100vh;
        background-color: #f4f7f6;
      }
      .container {
        display: grid;
        grid-template-columns: 1fr 350px;
        width: 100%;
        gap: 20px;
        padding: 20px;
      }
      .panel {
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        padding: 20px;
        overflow-y: auto;
      }
      h2 {
        color: var(--primary);
        margin-top: 0;
        border-bottom: 2px solid var(--light);
        padding-bottom: 10px;
      }

      /* Product Grid */
      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 15px;
      }
      .product-card {
        border: 1px solid var(--light);
        border-radius: 8px;
        padding: 15px;
        text-align: center;
        transition: transform 0.2s;
        cursor: pointer;
      }
      .product-card:hover {
        transform: translateY(-5px);
        border-color: var(--accent);
      }
      .product-card.wine {
        border-left: 5px solid #8e44ad;
      }
      .price {
        font-weight: bold;
        color: var(--accent);
        font-size: 1.2em;
      }
      .stock {
        color: #7f8c8d;
        font-size: 0.9em;
      }

      /* Cart */
      .cart-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid var(--light);
      }
      .btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
        font-size: 1em;
        margin-top: 20px;
      }
      .btn:hover {
        opacity: 0.9;
      }
      .btn-checkout {
        background: var(--success);
      }

      /* Order History */
      .order-history {
        margin-top: 20px;
        font-size: 0.85em;
      }
      .order-row {
        background: var(--light);
        margin-bottom: 5px;
        padding: 10px;
        border-radius: 4px;
      }

      .badge {
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 0.7em;
        text-transform: uppercase;
        background: #eee;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Main POS Area -->
      <div class="panel">
        <h2>Products & Wines</h2>
        <div id="product-list" class="product-grid">
          <!-- Products will be loaded here -->
        </div>

        <h2 style="margin-top: 40px">Order History</h2>
        <div id="order-history" class="order-history">
          <!-- Orders will be loaded here -->
        </div>
      </div>

      <!-- Cart Sidebar -->
      <div class="panel">
        <h2>Your Cart</h2>
        <div id="cart-items">
          <p style="color: #999">Cart is empty</p>
        </div>
        <div
          style="
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.2em;
            display: flex;
            justify-content: space-between;
          "
        >
          <span>Total:</span>
          <span id="cart-total">฿0.00</span>
        </div>
        <button class="btn btn-checkout" onclick="checkout()">
          Place Order
        </button>
        <button
          class="btn"
          style="background: #95a5a6; margin-top: 10px"
          onclick="clearCart()"
        >
          Clear Cart
        </button>

        <a href="http://localhost:8000/api/auth/login/google">
          Login with Google
        </a>
      </div>
    </div>

    <script>
      const API_BASE = "http://127.0.0.1:8000";
      let cart = [];
      let products = [];

      async function loadData() {
        try {
          const resp = await fetch(`${API_BASE}/products`);
          products = await resp.json();
          renderProducts();
          loadOrders();
        } catch (e) {
          console.error("Failed to load products", e);
        }
      }

      function renderProducts() {
        const list = document.getElementById("product-list");
        list.innerHTML = products
          .map(
            (p) => `
            <div class="product-card ${p.type}" onclick="addToCart(${p.id})">
                <span class="badge">${p.type}</span>
                <h3>${p.name}</h3>
                <p class="price">฿${p.price.toLocaleString()}</p>
                <p class="stock">Stock: ${p.stock}</p>
            </div>
        `,
          )
          .join("");
      }

      function addToCart(productId) {
        const product = products.find((p) => p.id === productId);
        const existing = cart.find((item) => item.product_id === productId);

        if (existing) {
          existing.quantity += 1;
        } else {
          cart.push({ ...product, product_id: productId, quantity: 1 });
        }
        renderCart();
      }

      function renderCart() {
        const container = document.getElementById("cart-items");
        if (cart.length === 0) {
          container.innerHTML = '<p style="color: #999;">Cart is empty</p>';
          document.getElementById("cart-total").innerText = "฿0.00";
          return;
        }

        container.innerHTML = cart
          .map(
            (item) => `
            <div class="cart-item">
                <div>
                    <strong>${item.name}</strong><br>
                    <small>฿${item.price} x ${item.quantity}</small>
                </div>
                <span>฿${(item.price * item.quantity).toLocaleString()}</span>
            </div>
        `,
          )
          .join("");

        const total = cart.reduce(
          (sum, item) => sum + item.price * item.quantity,
          0,
        );
        document.getElementById("cart-total").innerText =
          `฿${total.toLocaleString()}`;
      }

      function clearCart() {
        cart = [];
        renderCart();
      }

      async function checkout() {
        if (cart.length === 0) return alert("Cart is empty!");

        const orderData = {
          user_id: 1, // Default test user
          address_id: 1, // Default test address
          payment_method: "cash",
          items: cart.map((item) => ({
            product_id: item.product_id,
            quantity: item.quantity,
          })),
        };

        try {
          const resp = await fetch(`${API_BASE}/orders`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(orderData),
          });

          const result = await resp.json();
          if (resp.ok) {
            alert("Order placed successfully!");
            clearCart();
            loadData(); // Refresh stock and history
          } else {
            alert("Error: " + (result.detail || "Something went wrong"));
          }
        } catch (e) {
          alert("Failed to connect to backend");
        }
      }

      async function loadOrders() {
        try {
          const resp = await fetch(`${API_BASE}/orders`);
          const orders = await resp.json();
          const container = document.getElementById("order-history");

          container.innerHTML = orders
            .reverse()
            .slice(0, 5)
            .map(
              (o) => `
                <div class="order-row">
                    <strong>Order #${o.id}</strong> - Total: ฿${o.total_price.toLocaleString()} 
                    <span class="badge" style="background: ${o.status === "success" ? "#d5f5e3" : "#fdedec"}">${o.status}</span>
                    <br>
                    <small>${new Date(o.created_at).toLocaleString()}</small>
                </div>
            `,
            )
            .join("");
        } catch (e) {}
      }

      loadData();
    </script>
  </body>
</html>
