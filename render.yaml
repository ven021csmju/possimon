services:
  - type: web
    name: possimon-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: possimon-db
          property: connectionString
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB_NAME
        value: shopdb
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: LINE_CHANNEL_ID
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET_IMAGES
        value: review-images
      - key: SUPABASE_BUCKET_VIDEOS
        value: review-video
      - key: SUPABASE_BUCKET_PRODUCT_IMAGES
        value: product-images

databases:
  - name: possimon-db
    plan: free
